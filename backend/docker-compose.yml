services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: fitmentor
      POSTGRES_PASSWORD: fitmentor
      POSTGRES_DB: fitmentor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitmentor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Uncomment once you Dockerize the app (Day 13)
  # api:
  #   build: .
  #   env_file: .env
  #   ports: ["8000:8000"]
  #   depends_on:
  #     postgres: {condition: service_healthy}
  #     redis:    {condition: service_healthy}

volumes:
  pgdata:
